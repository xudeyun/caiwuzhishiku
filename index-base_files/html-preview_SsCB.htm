                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i &lt; binary.length; i++) bytes[i] = binary.charCodeAt(i);
                const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
                area.innerHTML = '';
                for (let pageNum = 1; pageNum &lt;= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: 1.5 });
                    const canvas = document.createElement('canvas');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    canvas.style.maxWidth = '100%';
                    canvas.style.height = 'auto';
                    canvas.style.marginBottom = '20px';
                    canvas.style.boxShadow = '0 2px 8px rgba(0,0,0,0.1)';
                    const ctx = canvas.getContext('2d');
                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                    area.appendChild(canvas);
                }
            } catch (e) {
                area.innerHTML = '&lt;div style=&quot;text-align:center;color:#ef4444;padding:40px;&quot;&gt;PDF 加载失败&lt;/div&gt;';
            }
        }

        /**
         * 关闭全屏预览
         */
        function closeFullscreen() {
            document.getElementById('fullscreenOverlay').classList.remove('show');
            document.getElementById('fullscreenContent').innerHTML = '';
        }

        // ESC 关闭全屏
        document.addEventListener('keydown', (e) =&gt; {
            if (e.key === 'Escape') {
                const overlay = document.getElementById('fullscreenOverlay');
                if (overlay.classList.contains('show')) {
                    closeFullscreen();
                }
            }
        });

        /**
         * 确认删除
         */
        async function confirmDelete() {
            if (!currentDetailId) return;
            
            try {
                await deleteItem(currentDetailId);
                closeModal();
                await refreshList();
                showToast('删除成功！');
            } catch (error) {
                console.error('删除失败:', error);
                showToast('删除失败，请重试！');
            }
        }

        // ==========================================
        // 批量操作
        // ==========================================

        /**
         * 切换批量模式
         */
        function toggleBatchMode() {
            batchMode = !batchMode;
            selectedIds.clear();
            
            const batchBar = document.getElementById('batchBar');
            const batchBtn = document.getElementById('batchModeBtn');
            
            if (batchMode) {
                batchBar.classList.add('show');
                batchBtn.textContent = '✖️ 退出管理';
                batchBtn.style.background = '#EF4444';
                batchBtn.style.color = 'white';
            } else {
                batchBar.classList.remove('show');
                batchBtn.textContent = '☑️ 批量管理';
                batchBtn.style.background = '';
                batchBtn.style.color = '';
            }
            
            refreshList();
        }

        /**
         * 退出批量模式
         */
        function exitBatchMode() {
            batchMode = false;
            selectedIds.clear();
            
            const batchBar = document.getElementById('batchBar');
            const batchBtn = document.getElementById('batchModeBtn');
            batchBar.classList.remove('show');
            batchBtn.textContent = '☑️ 批量管理';
            batchBtn.style.background = '';
            batchBtn.style.color = '';
            
            refreshList();
        }

        /**
         * 切换单个选中状态
         */
        function toggleSelect(id, checked) {
            if (checked) {
                selectedIds.add(id);
            } else {
                selectedIds.delete(id);
            }
            updateBatchInfo();
            
            // 更新卡片选中样式
            const card = document.querySelector(`.knowledge-card[onclick*=&quot;${id}&quot;]`);
            if (card) {
                card.classList.toggle('selected', checked);
            }
        }

        /**
         * 全选当前可见条目
         */
        async function selectAllVisible() {
            const items = await getAllItems();
            let filtered = items;
            if (currentTab !== 'all') {
                filtered = items.filter(i =&gt; i.category === currentTab);
            }
            
            // 如果已经全选，则取消全选
            const allSelected = filtered.every(i =&gt; selectedIds.has(i.id));
            if (allSelected) {
                selectedIds.clear();
            } else {
                filtered.forEach(i =&gt; selectedIds.add(i.id));
            }
            
            updateBatchInfo();
            refreshList();
        }

        /**
         * 更新批量操作信息
         */
        function updateBatchInfo() {
            document.getElementById('batchInfo').textContent = `已选 ${selectedIds.size} 项`;
        }

        /**
         * 确认批量删除
         */
        async function confirmBatchDelete() {
            if (selectedIds.size === 0) {
                showToast('请先选择要删除的条目！');
                return;
            }
            
            if (!confirm(`确定要删除选中的 ${selectedIds.size} 个条目吗？此操作不可恢复。`)) {
                return;
            }
            
            try {
                const deleteCount = selectedIds.size;
                for (const id of selectedIds) {
                    await deleteItem(id);
                }
                selectedIds.clear();
                await refreshList();
                updateBatchInfo();
                showToast(`成功删除 ${deleteCount} 条目！`);
                
                // 如果删完了，自动退出批量模式
                const remaining = await getAllItems();
                if (remaining.length === 0) {
                    exitBatchMode();
                }
            } catch (error) {
                console.error('批量删除失败:', error);
                showToast('删除失败，请重试！');
            }
        }

        /**
         * 处理卡片点击（批量模式下不打开详情）
         */
        function handleCardClick(id) {
            if (batchMode) {
                // 批量模式下点击卡片切换选中状态
                const isChecked = selectedIds.has(id);
                toggleSelect(id, !isChecked);
                refreshList();
            } else {
                showDetail(id);
            }
        }

        // 点击弹窗背景关闭
        document.getElementById('detailModal').addEventListener('click', (e) =&gt; {
            if (e.target.classList.contains('modal-overlay')) {
                closeModal();
            }
        });

        // ==========================================
        // 导入导出
        // ==========================================

        /**
         * 导出数据
         */
        async function exportData() {
            try {
                const items = await getAllItems();
                
                if (items.length === 0) {
                    showToast('没有数据可导出！');
                    return;
                }
                
                const data = {
                    version: 1,
                    exportTime: new Date().toISOString(),
                    items: items
                };
                
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `知识库备份_${formatDate(new Date())}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showToast('导出成功！');
            } catch (error) {
                console.error('导出失败:', error);
                showToast('导出失败，请重试！');
            }
        }

        /**
         * 导入数据
         */
        async function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            try {
                const text = await readTextFile(file);
                const data = JSON.parse(text);
                
                if (!data.items || !Array.isArray(data.items)) {
                    throw new Error('无效的备份文件格式');
                }
                
                // 清空现有数据
                await clearAllItems();
                
                // 导入新数据
                await addItems(data.items);
                
                await refreshList();
                showToast(`导入成功！共导入 ${data.items.length} 条知识`);
            } catch (error) {
                console.error('导入失败:', error);
                showToast('导入失败，请选择有效的备份文件！');
            }
            
            event.target.value = '';
        }

        /**
         * 导出 GitHub Pages 共享版
         */
        async function exportGitHubPages() {
            try {
                const items = await getAllItems();
                
                if (items.length === 0) {
                    showToast('没有数据可导出！');
                    return;
                }
                
                // 1. 导出 data.json
                const data = {
                    version: 1,
                    exportTime: new Date().toISOString(),
                    itemCount: items.length,
                    items: items
                };
                const dataBlob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                
                // 2. 导出 README
                const readme = `# 知识库 GitHub Pages 部署说明

## 部署步骤
1. 在 GitHub 创建一个新仓库（如 knowledge-base）
2. 将以下 3 个文件上传到仓库根目录：
   - **data.json**（刚下载的，包含你的知识库数据）
   - **index.html**（把你当前使用的 knowledge-base.html 重命名为 index.html）
   - **README.md**（本说明文件）
3. 进入仓库 Settings → Pages
4. Source 选择 &quot;Deploy from a branch&quot;
5. Branch 选择 &quot;main&quot;，目录选 &quot;/ (root)&quot;，点击 Save
6. 等待 1-2 分钟后，访问 https://你的用户名.github.io/仓库名/

## 更新数据
在本版本更新知识库后，重新导出 data.json 替换 GitHub 仓库中的文件即可。

## 注意事项
- 共享版为只读，访客可浏览、搜索、问答，但不能上传编辑
- 智能问答需访客自行配置 API Key
- data.json 包含文件原始数据，可能较大（GitHub 单文件限制 100MB）
`;
                const readmeBlob = new Blob([readme], { type: 'text/markdown' });
                
                // 下载 data.json
                downloadBlob(dataBlob, 'data.json');
                showToast('第1步：data.json 已下载');
                
                setTimeout(() =&gt; {
                    downloadBlob(readmeBlob, 'README.md');
                    showToast('第2步：README.md 已下载。请将 knowledge-base.html 重命名为 index.html 一起上传');
                }, 800);
                
            } catch (error) {
                console.error('导出失败:', error);
                showToast('导出失败：' + error.message);
            }
        }

        // ==========================================
        // 初始化
        // ==========================================

        /**
         * 应用初始化
         */
        async function init() {
            try {
                // 设置 PDF.js worker
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                
                if (IS_GITHUB_PAGES) {
                    // GitHub Pages 模式：从 data.json 加载数据
                    try {
                        const response = await fetch('./data.json');
                        if (!response.ok) throw new Error('无法加载 data.json');
                        const data = await response.json();
                        remoteItems = data.items || [];
                        console.log(`GitHub Pages 模式：加载了 ${remoteItems.length} 条知识`);
                    } catch (fetchError) {
                        console.error('加载远程数据失败:', fetchError);
                        throw fetchError;
                    }
                } else {
                    // 本地模式：初始化 IndexedDB
                    await initDB();
                }
                
                // 刷新列表
                await refreshList();
                
                // 初始化分类选择器样式
                updateCategoryIndicator();
                
                // 初始化视图模式（默认聊天模式）
                switchViewMode('chat');
                
                // GitHub Pages 模式下隐藏编辑相关的 UI
                if (IS_GITHUB_PAGES) {
                    // 隐藏导出/导入按钮（保留导出共享版按钮）
                    const headerActions = document.querySelector('.header-actions');
                    if (headerActions) {
                        const btns = headerActions.querySelectorAll('.btn-secondary');
                        btns.forEach(btn =&gt; {
                            // 保留&quot;导出共享版&quot;按钮，隐藏其他编辑相关按钮
                            if (!btn.textContent.includes('共享版')) {
                                btn.style.display = 'none';
                            }
                        });
                    }
                    
                    // 隐藏批量管理按钮
                    const batchBtn = document.getElementById('batchModeBtn');
                    if (batchBtn) batchBtn.style.display = 'none';
                    
                    // 隐藏底部输入区（拖拽上传、文件上传、知识输入）
                    const inputArea = document.querySelector('.input-area');
                    if (inputArea) inputArea.style.display = 'none';
                    
                    // 隐藏搜索结果面板中的&quot;添加&quot;按钮（如果有）
                    const addBtn = document.querySelector('.search-panel .btn');
                    if (addBtn) addBtn.style.display = 'none';
                    
                    // 修改页面标题
                    document.title = '知识库 - 核算与税务（共享版）';
                    
                    // 在 logo 旁添加&quot;共享版&quot;标签
                    const logo = document.querySelector('.logo');
                    if (logo) {
                        const badge = document.createElement('span');
                        badge.style.cssText = 'font-size:12px;background:#22C55E;color:white;padding:2px 8px;border-radius:4px;margin-left:8px;';
                        badge.textContent = '共享版';
                        logo.appendChild(badge);
                    }
                    
                    // 隐藏卡片中的删除按钮
                    const cardDeleteBtns = document.querySelectorAll('.card-actions .btn-danger');
                    cardDeleteBtns.forEach(btn =&gt; btn.style.display = 'none');
                    
                    console.log('GitHub Pages 共享模式已启用');
                }

                console.log('知识库应用初始化完成');
            } catch (error) {
                console.error('初始化失败:', error);
                showToast('应用初始化失败，请刷新重试！');
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    &lt;/script&gt;
